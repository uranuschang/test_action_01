name: C Build and Auto Release

on:
  # push:
  #   tags:
  #     - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # 必須設定為 0 才能抓取完整的 Git 歷史紀錄

    - name: Setup MSVC Developer Command Prompt
      uses: ilammy/msvc-dev-cmd@v1

    - name: Run Build Script
      shell: cmd
      run: call hello\build.cmd

    - name: Generate Custom Changelog
      id: changelog
      shell: bash
      run: |
        # 抓取上一個標籤到現在的所有 Commit 訊息
        # 如果是第一個標籤，則抓取所有紀錄
        # 使用 EOF 處理多行字串，避免空格和換行導致的錯誤
        echo "body<<EOF" >> $GITHUB_OUTPUT
        git log --oneline -n 10 >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: hello.exe
        name: Release ${{ github.ref_name }}
        # 核心功能：自動產生基於 PR/Commit 的筆記
        generate_release_notes: true 
        # 如果你想加入自己抓取的內容，可以使用 body 參數
        body: |
          ### 🛠 近期變更 (Last 10 Commits)
          ${{ steps.changelog.outputs.body }}
          
          ---
          *由 GitHub Actions 自動發布*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
