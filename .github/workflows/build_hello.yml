name: C Build and Auto Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # 必須設定為 0 才能抓取完整的 Git 歷史紀錄

    - name: Setup MSVC Developer Command Prompt
      uses: ilammy/msvc-dev-cmd@v1

    - name: Run Build Script
      shell: cmd
      run: call hello\build.cmd
    
    - name: Rename executable with version
      shell: cmd
      run: |
        # 將編譯出的 hello.exe 改名為包含版本號的名稱
        # github.ref_name 在 tag 觸發時會是 "v1.0.1"
        echo "Current Ref: ${{ github.ref_name }}"
        :: 檢查檔案是否存在，避免 ren 失敗
        if exist hello.exe (
            ren hello.exe hello-${{ github.ref_name }}-win64.exe
        ) else (
            echo "Error: hello.exe not found!" && exit 1
        )

    - name: Generate Custom Changelog
      id: changelog
      shell: bash
      run: |
        # 抓取上一個標籤到現在的所有 Commit 訊息
        # 如果是第一個標籤，則抓取所有紀錄
        # 使用 EOF 處理多行字串，避免空格和換行導致的錯誤
        echo "body<<EOF" >> $GITHUB_OUTPUT
        git log --oneline -n 10 >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        # 這裡原本你寫 hello.exe，但因為上面改名了，所以這裡要改
        files: hello-${{ github.ref_name }}-win64.exe
        name: Release ${{ github.ref_name }}
        # 核心功能：自動產生基於 PR/Commit 的筆記
        generate_release_notes: true 
        # 如果你想加入自己抓取的內容，可以使用 body 參數
        body: |
          ### 🛠 近期變更 (Last 10 Commits)
          ${{ steps.changelog.outputs.body }}
          
          ---
          *由 GitHub Actions 自動發布*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
